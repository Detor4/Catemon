name: cat_detector_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  onnxruntime: ^1.4.0
  camera: ^0.11.1
  image: ^4.2.0
  path_provider: ^2.1.6
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  web:
    generate: true
    image_path: assets/app_icon.png
    background_color: "#0D0D0F"
    theme_color: "#FF6B35"
  windows:
    generate: true
    image_path: assets/app_icon.png
  macos:
    generate: true
    image_path: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/best.onnx
    - assets/google_fonts/